name: Aas Deploy

on:
  workflow_run:
    workflows: ["App Release (Merge to Main)"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PROJECT: wings
  DEPLOYMENT_TYPE: aas
  ACR: crwings.azurecr.io
  IMAGE: wings

jobs:
  deploy_dev:
    name: Deploy to Dev Staging
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Push new image to dev staging slot
        run: |
          az webapp config container set \
            --resource-group rg-${{ env.PROJECT }}-${{ env.DEPLOYMENT_TYPE }}-dev \
            --name app-${{ env.PROJECT }}-${{ env.DEPLOYMENT_TYPE }}-dev \
            --slot staging \
            --docker-custom-image-name ${{ env.ACR }}/${{ env.IMAGE }}:latest

  swap_dev:
    name: Swap Dev Slots
    runs-on: ubuntu-latest
    needs: deploy_dev
    environment: dev

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Swap dev staging to production
        run: |
          az webapp deployment slot swap \
            --resource-group rg-${{ env.PROJECT }}-${{ env.DEPLOYMENT_TYPE }}-dev \
            --name app-${{ env.PROJECT }}-${{ env.DEPLOYMENT_TYPE }}-dev \
            --slot staging

  deploy_qa:
    name: Deploy to QA Staging
    runs-on: ubuntu-latest
    needs: swap_dev

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Push new image to qa staging slot
        run: |
          az webapp config container set \
            --resource-group rg-${{ env.PROJECT }}-${{ env.DEPLOYMENT_TYPE }}-qa \
            --name app-${{ env.PROJECT }}-${{ env.DEPLOYMENT_TYPE }}-qa \
            --slot staging \
            --docker-custom-image-name ${{ env.ACR }}/${{ env.IMAGE }}:latest

  swap_qa:
    name: Swap QA Slots
    runs-on: ubuntu-latest
    needs: deploy_qa
    environment: qa

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Swap qa staging to production
        run: |
          az webapp deployment slot swap \
            --resource-group rg-${{ env.PROJECT }}-${{ env.DEPLOYMENT_TYPE }}-qa \
            --name app-${{ env.PROJECT }}-${{ env.DEPLOYMENT_TYPE }}-qa \
            --slot staging

  deploy_prod:
    name: Deploy to Prod Staging
    runs-on: ubuntu-latest
    needs: swap_qa

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Push new image to prod staging slot
        run: |
          az webapp config container set \
            --resource-group rg-${{ env.PROJECT }}-${{ env.DEPLOYMENT_TYPE }}-prod \
            --name app-${{ env.PROJECT }}-${{ env.DEPLOYMENT_TYPE }}-prod \
            --slot staging \
            --docker-custom-image-name ${{ env.ACR }}/${{ env.IMAGE }}:latest

  swap_prod:
    name: Swap Prod Slots
    runs-on: ubuntu-latest
    needs: deploy_prod
    environment: prod

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Swap prod staging to production
        run: |
          az webapp deployment slot swap \
            --resource-group rg-${{ env.PROJECT }}-${{ env.DEPLOYMENT_TYPE }}-prod \
            --name app-${{ env.PROJECT }}-${{ env.DEPLOYMENT_TYPE }}-prod \
            --slot staging
