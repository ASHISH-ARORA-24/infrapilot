name: Aas TF Destroy

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      log_level:
        description: "Terraform log level (none = normal output)"
        required: false
        type: choice
        default: none
        options:
          - none
          - DEBUG
          - TRACE
          - INFO
          - WARN
          - ERROR

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  destroy:
    name: Destroy (${{ matrix.environment }})
    runs-on: ubuntu-latest
    concurrency:
      group: tf-aas-${{ matrix.environment }}
      cancel-in-progress: false
    strategy:
      matrix:
        environment: [dev, qa, prod]
      fail-fast: false
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_ACCESS_KEY: ${{ secrets.ARM_ACCESS_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure Terraform logging
        if: inputs.log_level != '' && inputs.log_level != 'none'
        run: echo "TF_LOG=${{ inputs.log_level }}" >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: deployment/aas/env/${{ matrix.environment }}
        run: terraform init

      - name: Resolve django secret key
        env:
          SECRET_DEV: ${{ secrets.TF_VAR_DJANGO_SECRET_KEY_AAS_DEV }}
          SECRET_QA: ${{ secrets.TF_VAR_DJANGO_SECRET_KEY_AAS_QA }}
          SECRET_PROD: ${{ secrets.TF_VAR_DJANGO_SECRET_KEY_AAS_PROD }}
        run: |
          case "${{ matrix.environment }}" in
            dev)  echo "TF_VAR_django_secret_key=$SECRET_DEV"  >> $GITHUB_ENV ;;
            qa)   echo "TF_VAR_django_secret_key=$SECRET_QA"   >> $GITHUB_ENV ;;
            prod) echo "TF_VAR_django_secret_key=$SECRET_PROD" >> $GITHUB_ENV ;;
          esac

      - name: Terraform Plan Destroy
        working-directory: deployment/aas/env/${{ matrix.environment }}
        run: terraform plan -destroy -no-color -lock-timeout=5m

      - name: Terraform Destroy
        working-directory: deployment/aas/env/${{ matrix.environment }}
        run: terraform destroy -auto-approve -lock-timeout=5m
