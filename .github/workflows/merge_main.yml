name: Merge to Main

on:
  push:
    branches:
      - main
    paths-ignore:
      - "deployment/**"
      - ".github/**"
      - "docs/**"
      - "**.md"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run black
        run: uv run black --check .

      - name: Run isort
        run: uv run isort --check .

      - name: Run flake8
        run: uv run flake8 .

  test:
    name: Testing
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pytest
        run: uv run pytest

  release:
    name: Version and Changelog
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run semantic release
        run: uv run semantic-release version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bootstrap:
    name: Bootstrap ACR
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Ensure bootstrap resource group exists
        run: |
          if ! az group show --name rg-infrap-bootstrap &>/dev/null; then
            az group create --name rg-infrap-bootstrap --location southindia
          fi

      - name: Ensure ACR exists
        run: |
          if ! az acr show --name crinfrap --resource-group rg-infrap-bootstrap &>/dev/null; then
            az acr create --resource-group rg-infrap-bootstrap --name crinfrap --sku Basic --admin-enabled false
          fi

      - name: Ensure AcrPush role for service principal
        run: |
          ACR_ID=$(az acr show --name crinfrap --query id -o tsv)
          EXISTING=$(az role assignment list --assignee ${{ secrets.AZURE_CLIENT_ID }} --role AcrPush --scope $ACR_ID --query "length(@)" -o tsv)
          if [ "$EXISTING" = "0" ]; then
            az role assignment create --assignee ${{ secrets.AZURE_CLIENT_ID }} --role AcrPush --scope $ACR_ID
          fi

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: bootstrap

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Get version and lowercase owner
        id: meta
        run: |
          VERSION=$(grep "^version" pyproject.toml | head -1 | sed 's/version = "//' | sed 's/"//')
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "owner=$OWNER" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: crinfrap.azurecr.io
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/infrapilot:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.meta.outputs.owner }}/infrapilot:latest
            crinfrap.azurecr.io/infrapilot:${{ steps.meta.outputs.version }}
            crinfrap.azurecr.io/infrapilot:latest
